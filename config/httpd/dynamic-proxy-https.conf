# Dynamic Proxy HTTPS Configuration
# This file provides the HTTPS endpoints for the Dynamic Proxy service
# The reverse proxy backends are managed dynamically by the Go application
# and stored in /etc/httpd/conf.d/dynamic-proxy.conf


<VirtualHost _default_:8443>
    ServerName localhost
    ServerAdmin admin@localhost
    
    # SSL/TLS Configuration
    SSLEngine on
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLCertificateFile /etc/httpd/tls/localhost.crt
    SSLCertificateKeyFile /etc/httpd/tls/localhost.key
    
    # Proxy Configuration
    ProxyPreserveHost On
    ProxyRequests Off
    
    # DoH endpoint (DNS over HTTPS) - provided by dynamic-proxy Go application
    ProxyPass /dns-query http://host.docker.internal:6002/dns-query
    ProxyPassReverse /dns-query http://host.docker.internal:6002/dns-query
    
    # Management UI & REST API - provided by dynamic-proxy Go application
    ProxyPass /v1/proxy http://host.docker.internal:6002/v1/proxy
    ProxyPassReverse /v1/proxy http://host.docker.internal:6002/v1/proxy
    
    # CA certificate download endpoint
    ProxyPass /v1/ca/download http://host.docker.internal:6002/v1/ca/download
    ProxyPassReverse /v1/ca/download http://host.docker.internal:6002/v1/ca/download
    
    # Health check endpoint
    ProxyPass /health http://host.docker.internal:6002/health
    ProxyPassReverse /health http://host.docker.internal:6002/health
    
    # Logging
    ErrorLog /var/log/httpd/dynamic-proxy-https_error_log
    CustomLog /var/log/httpd/dynamic-proxy-https_access_log combined
    
    # Named virtual hosts for backend services are managed dynamically
    # by the dynamic-proxy application and loaded from /etc/httpd/conf.d/dynamic-proxy.conf
</VirtualHost>

# Include dynamically managed virtual host configurations
Include conf.d/dynamic-proxy.conf

# Apache httpd configuration for Dynamic Proxy (HTTPS)
# This file can be edited manually by administrators
# Changes will be read on next application startup or reload
# NOTE: Update SSLCertificateFile/Key if needed.

# NOTE: Update SSLCertificateFile/Key if needed.
<VirtualHost *:8443>
    ServerName sdwan.proxy
    
    SSLEngine on
    SSLCertificateFile config/tls/sdwan.proxy.crt
    SSLCertificateKeyFile config/tls/sdwan.proxy.key
    
    # HTTPSバックエンド対応
    SSLProxyEngine On
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyProtocol all -SSLv3
    
    # CSP override for iframe integration
    <Location />
        Header unset X-Frame-Options
        Header unset Content-Security-Policy
        Header set Content-Security-Policy "default-src 'self' https: http:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: http:; style-src 'self' 'unsafe-inline' https: http:; img-src 'self' data: blob: https: http:; font-src 'self' data: https: http:; connect-src 'self' https: http: wss: ws:; frame-src 'self'; frame-ancestors 'self' https://localhost:8443; form-action 'self'; base-uri 'self'; object-src 'none'"
    </Location>
    
    ProxyPreserveHost Off
    ProxyPass / https://manager.sdwan.danmaid.com// disablereuse=on
    ProxyPassReverse / https://manager.sdwan.danmaid.com//
    
    ErrorLog /var/log/httpd/sdwan_proxy_error.log
    CustomLog /var/log/httpd/sdwan_proxy_access.log combined
</VirtualHost>


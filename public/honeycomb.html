<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>title</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      height: 100vh;
      width: 100vw;
      margin: 0;
    }

    .cell {
      position: absolute;
      width: var(--hex-width);
      height: var(--hex-height);
      background: #555;
      clip-path: url(#hexgrid-mask);
      transform: translate(0, 0);
    }

    .cell.usable {
      background: orange;
    }
  </style>
</head>

<body>
  <div id="container" style="position: relative; width: 100%; height: 100%; overflow: hidden;"></div>
  <svg width="0" height="0" style="position: absolute;">
    <defs>
      <clipPath id="hexgrid-mask" clipPathUnits="objectBoundingBox">
        <polygon points="0.5 0, 1 0.25, 1 0.75, 0.5 1, 0 0.75, 0 0.25" />
      </clipPath>
    </defs>
  </svg>

  <div id="debug-overlay"></div>
  <style>
    #debug-overlay {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 9999;

      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.4;

      padding: 8px 10px;
      border-radius: 4px;
      pointer-events: none;
    }
  </style>

  <script>
    const container = document.getElementById('container')
    const cells = []

    function initElements(n) {
      const factor =
        n < 120 ? 1.8 :
          n < 400 ? 1.6 :
            n < 1200 ? 1.4 :
              n < 5000 ? 1.25 :
                1.15
      const total = Math.ceil(n * factor)

      for (let i = 0; i < total; i++) {
        const div = document.createElement('div')
        div.className = 'cell'
        container.appendChild(div)
        cells.push(div)
      }
    }

    function updateHexSize(n) {
      const container = document.getElementById('container')
      const W = container.clientWidth
      const H = container.clientHeight

      // ★ 境界ロス吸収用の安全係数
      const SAFETY = 1.1

      // 六角形1個あたりの「理論面積」
      const areaPerHex = (W * H) / (n * SAFETY)

      // A = 3√3 / 2 * s^2
      const s = Math.sqrt(areaPerHex / (3 * Math.sqrt(3) / 2))

      const hexWidth = Math.sqrt(3) * s
      const hexHeight = 2 * s

      container.style.setProperty('--hex-width', `${hexWidth}px`)
      container.style.setProperty('--hex-height', `${hexHeight}px`)

      return { s, hexWidth, hexHeight }
    }

    function layout(n) {
      const container = document.getElementById('container')
      const cells = Array.from(container.children)

      const W = container.clientWidth
      const H = container.clientHeight

      if (cells.length === 0) return

      // CSS変数から六角形サイズを取得
      const style = getComputedStyle(container)
      const hexWidth = parseFloat(style.getPropertyValue('--hex-width'))
      const hexHeight = parseFloat(style.getPropertyValue('--hex-height'))

      const s = hexHeight / 2
      const dx = hexWidth
      const dy = 1.5 * s

      const cols = Math.ceil(W / dx) + 2
      const rows = Math.ceil(cells.length / cols)

      const offsetX = W / 2 - (cols * dx) / 2
      const offsetY = H / 2 - (rows * dy) / 2

      // usable領域
      const usableLeft = -hexWidth * 0.6
      const usableTop = -hexHeight * 0.6
      const usableRight = W - hexWidth * 0.4
      const usableBottom = H - hexHeight * 0.4

      cells.forEach(cell => {
        // 後で全部 false にする前提
        cell.classList.remove('usable')
      })

      for (let i = 0; i < cells.length; i++) {
        const cell = cells[i]

        const row = Math.floor(i / cols)
        const col = i % cols

        let cx = col * dx
        let cy = row * dy

        if (row % 2 === 1) {
          cx += dx / 2
        }

        cx += offsetX
        cy += offsetY

        // 外接矩形
        const left = cx - hexWidth / 2
        const right = cx + hexWidth / 2
        const top = cy - hexHeight / 2
        const bottom = cy + hexHeight / 2

        const isUsable =
          left >= usableLeft &&
          right <= usableRight &&
          top >= usableTop &&
          bottom <= usableBottom

        if (isUsable) {
          cell.classList.add('usable')
        }

        cell.style.transform =
          `translate(${Math.round(cx)}px, ${Math.round(cy)}px)`
      }
      updateDebugOverlay()
    }

    function updateDebugOverlay() {
      const overlay = document.getElementById('debug-overlay')
      const container = document.getElementById('container')

      const cells = Array.from(container.children)
      const total = cells.length

      const usable = cells.filter(c => c.classList.contains('usable')).length
      const invalid = total - usable

      // 画面外（完全に見えていない）
      const rect = container.getBoundingClientRect()

      let invisible = 0
      for (const cell of cells) {
        const r = cell.getBoundingClientRect()
        const out =
          r.right < rect.left ||
          r.left > rect.right ||
          r.bottom < rect.top ||
          r.top > rect.bottom

        if (out) invisible++
      }

      overlay.textContent = `
        total      : ${total}
        usable     : ${usable}
        invalid    : ${invalid}
        invisible  : ${invisible}`
    }

    // ---- 実行 ----
    const usableCount = 1200

    initElements(usableCount)
    function relayout(n) {
      updateHexSize(n)
      layout(n)
    }

    relayout(usableCount)

    window.addEventListener('resize', () => {
      relayout(usableCount)
    })
  </script>
</body>

</html>

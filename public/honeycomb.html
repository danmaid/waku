<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hex Honeycomb</title>

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
    }
  </style>
  <script src="dm-honeycomb.js"></script>
</head>

<body>
  <dm-honeycomb>
    <template>
      <div class="outer">
        <div class="inner"></div>
      </div>
    </template>
    <style>
      dm-honeycomb .item-cell {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      dm-honeycomb .item-cell::before {
        content: attr(data-host);
        z-index: 1;
      }

      dm-honeycomb .inner {
        position: absolute;
        inset: 1%;
        background: rgba(0, 0, 0, 0.5);
        clip-path: inherit;
      }
    </style>
  </dm-honeycomb>
  <script type="module">
    const items = await(await fetch('/v1/hosts')).json()
    const honeycomb = document.querySelector('dm-honeycomb')
    // ダミーデータの生成
    // const items = Array.from({ length: 100 }, (_, i) => ({ host: `Item ${i + 1}` }))
    honeycomb.items = items
  </script>
</body>

</html>

<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ホスト一覧</title>
  <script async>navigator.serviceWorker.register('/sw.js', { type: 'module' })</script>
  <script async>
    async function load() {
      const r = await fetch('/v1/hosts')
      const hosts = await r.json()
      render(hosts)
    }

    /** @type {(hosts: Array<{host: string, name: string, critical: boolean, zabbix: boolean, sdwan: boolean, catc: boolean}>) => void} */
    function render(hosts) {
      const tbody = document.querySelector('table tbody')
      tbody.innerHTML = ''
      for (const h of hosts) {
        const tr = document.createElement('tr')
        tr.innerHTML = `
          <td>${h.host ?? ''}</td>
          <td>${h.name ?? ''}</td>
          <td>${h.critical ?? ''}</td>
          <td>${h.zabbix ?? ''}</td>
        `
        tbody.appendChild(tr)
      }
    }
  </script>
  <style>
    body {
      background: #0b0f17;
      color: #e6edf3;
      font-family: system-ui;
      margin: 0;
    }

    h1 {
      margin: 16px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      background: #181c24;
    }

    th,
    td {
      padding: 8px 12px;
      border: 1px solid #333;
    }

    th {
      background: #232a36;
    }

    tr:nth-child(even) {
      background: #22262e;
    }

    button {
      padding: 4px 10px;
      margin: 0 2px;
      border-radius: 4px;
      border: none;
      background: #8be9fd;
      color: #222;
      cursor: pointer;
    }

    button.delete {
      background: #ff5555;
      color: #fff;
    }

    button.edit {
      background: #f1fa8c;
      color: #222;
    }

    .form-row {
      margin: 12px 0;
    }

    input,
    select {
      padding: 4px 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #232a36;
      color: #e6edf3;
    }
  </style>
</head>

<body>
  <table id="hostsTable">
    <thead>
      <tr>
        <th>ホスト名</th>
        <th>IPアドレス</th>
        <th style="background-color: yellow; color: black;">重要
          <a href="/hands/critical.html" target="_blank" style="color: inherit; text-decoration: none;">(一覧)</a>
        </th>
        <th style="background-color: red;">Zabbix
          <a href="/zabbix/hosts.html" target="_blank" style="color: inherit; text-decoration: none;">(一覧)</a>
        </th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <script>
  </script>
  <script>load()</script>
</body>

</html>

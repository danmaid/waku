<!DOCTYPE html>
<html lang="ja">
<html>

<head>
  <meta charset='utf-8'>
  <title>Page Title</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <script async>navigator.serviceWorker.register('/sw.js', { type: 'module' })</script>
  <style>
    :root {
      color-scheme: dark;
      --sidebar-w: 60px;
      --header-h: 44px;
      --footer-h: 40px;
      --line: rgba(255, 255, 255, .12);

      /* --- Dark theme (固定) --- */
      --bg: #070b12;
      --panel: rgba(255, 255, 255, .05);
      --panel2: rgba(255, 255, 255, .08);
      --text: rgba(255, 255, 255, .92);
      --muted: rgba(255, 255, 255, .62);
      --accent: #8be9fd;
      --shadow: 0 10px 26px rgba(0, 0, 0, .38);

      /* --- Compact sizes（メイン領域を最大化） --- */
      --header-full: 44px;
      --footer-full: 40px;
      --sidebar-full: 60px;

      /* auto-hide時の“逃げ”量（さらに薄く） */
      --header-peek: 4px;
      --footer-peek: 4px;
      --sidebar-peek: 6px;

      /* per-edge sizing (左右別) */
      --header-h: var(--header-full);
      --footer-h: var(--footer-full);

      --radius: 0px;
      --icon-size: 20px;
      --circle: 40px;

      --hotzone: 8px;
      /* 端ホバー検知 */
      --anim: 160ms;
    }

    body {
      height: 100vh;
      width: 100vw;
      margin: 0;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr var(--sidebar-w);
      grid-template-rows: var(--header-h) 1fr var(--footer-h);
      grid-template-areas:
        "header header header"
        "left main right"
        "footer footer footer";
    }

    .header {
      grid-area: header;
      border-bottom: 1px solid var(--line);
    }

    .left {
      grid-area: left;
      border-right: 1px solid var(--line);
    }

    .main {
      grid-area: main;
    }

    .right {
      grid-area: right;
      border-left: 1px solid var(--line);
    }

    .footer {
      grid-area: footer;
      border-top: 1px solid var(--line);
    }
  </style>
</head>

<body>
  <header class="header"></header>
  <aside class="left">
    <nav>
      <button href="honeycomb.html">honeycomb</button>
    </nav>
  </aside>
  <main class="main">
    <iframe style="width: 100%; height: 100%; display: block; box-sizing: border-box; border: none;"></iframe>
  </main>
  <aside class="right"></aside>
  <footer class="footer">
    <nav>
      <button href="hosts.html">hosts</button>
      <button href="sites.html">sites</button>
      <button href="hands/critical.html">critical</button>
      <button href="zabbix/hosts.html">zabbix</button>
    </nav>
  </footer>
  <script>
    const iframe = document.querySelector('iframe')
    for (const button of document.querySelectorAll('nav button[href]')) {
      button.addEventListener('click', () => {
        iframe.src = button.getAttribute('href')
      })
    }
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>障害なう</title>
  <script src="/sw-register.js" async></script>
  <style>
    :root {
      --bg: #070b12;
      --line: rgba(255, 255, 255, .12);
      --text: rgba(255, 255, 255, .92);
      --accent: #8be9fd;
    }
    body {
      margin: 0;
      background:
        radial-gradient(900px 600px at 15% 10%, rgba(139, 233, 253, .14), transparent 55%),
        radial-gradient(900px 700px at 90% 0%, rgba(189, 147, 249, .12), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      min-height: 100vh;
    }
    .scroll-table {
      height: 100%;
      max-height: 100%;
      overflow-y: auto;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      color: var(--text);
    }
    th, td {
      border: 1px solid var(--line);
      padding: 0.5em;
      text-align: left;
      white-space: nowrap;
    }
    th {
      background: rgba(255,255,255,0.08);
    }
    caption {
      caption-side: top;
      font-weight: bold;
      font-size: 1.1em;
      padding: 0.3em 0;
      text-align: left;
      color: var(--accent);
    }
  </style>
</head>

<body>
  <div class="scroll-table" style="height: 90vh;">
    <table id="incident-table">
      <caption>障害なう</caption>
      <thead>
        <tr id="incident-header-row">
          <th>ID</th>
          <th>日時</th>
          <th>タイトル</th>
          <th>ホストID</th>
          <th>ホスト登録名</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>読み込み中...</td>
        </tr>
      </tbody>
    </table>
  </div>
  <script>
    // /v1/problems から取得し、hosts情報も含めて動的にテーブル描画
    async function fetchProblems() {
      const table = document.getElementById('incident-table');
      const theadRow = document.getElementById('incident-header-row');
      const tbody = table.querySelector('tbody');
      tbody.innerHTML = '<tr><td>読み込み中...</td></tr>';
      try {
        const res = await fetch('/v1/incidents');
        if (!res.ok) throw new Error('APIエラー: ' + res.status);
        const data = await res.json();
        tbody.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          theadRow.innerHTML = '<th>データなし</th>';
          tbody.innerHTML = '<tr><td>障害情報はありません</td></tr>';
          return;
        }
        // 動的にヘッダー生成（hosts配列があればhostid/hostも展開）
        let keys = Object.keys(data[0]);
        // hosts配列があれば展開
        if (data.some(item => Array.isArray(item.hosts) && item.hosts.length > 0)) {
          keys = keys.filter(k => k !== 'hosts');
          keys.push('hostid', 'host');
        }
        // theadRow.innerHTML = keys.map(k => `<th>${k}</th>`).join('');
        // データ行生成
        data.forEach(item => {
          if (Array.isArray(item.hosts) && item.hosts.length > 0) {
            item.hosts.forEach(h => {
              const tr = document.createElement('tr');
              const row = keys.map(k => {
                if (k === 'hostid') return h.hostid;
                if (k === 'host') return h.host;
                return item[k] ?? '';
              });
              tr.innerHTML = row.map(v => `<td>${v}</td>`).join('');
              tbody.appendChild(tr);
            });
          } else {
            const tr = document.createElement('tr');
            tr.innerHTML = keys.map(k => {
              if (k === 'hostid' || k === 'host') return '';
              return item[k] ?? '';
            }).join('');
            tbody.appendChild(tr);
          }
        });
      } catch (e) {
        theadRow.innerHTML = '<th>エラー</th>';
        tbody.innerHTML = `<tr><td>障害情報の取得に失敗しました: ${e.message}</td></tr>`;
      }
    }
    fetchProblems();
  </script>
</body>

</html>
